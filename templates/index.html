{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EmbidVoice- emotion-aware AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="chat-app">
    <div class="chat-header">
        <div class="header-flex">
            <h1>
                EmbidVoice
                <span>emotional mirror</span>
            </h1>
        </div>
        <div class="subhead">
            <span class="emotion-badge">🌱 listens with care</span>
            <span>· feel understood ·</span>
        </div>
    </div>

    <div class="messages-area" id="chatMessagesArea">
        <div class="messages-container" id="messagesContainer">
            <!-- dynamic messages will be injected -->
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Share what's in your heart..." autocomplete="off">
            <button id="sendButton">Send</button>
        </div>
        <div class="helper-note">↵ Enter to send · I reply with warmth and empathy</div>
    </div>
</div>

<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
